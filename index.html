<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends List - Bootstrap</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">Friends Directory</h1>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <button id="loadFriendsBtn" class="btn btn-primary">Load Friends</button>
        <p id="message" class="mt-3 mb-0 fw-bold"></p>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header">
        <h2 class="h5 mb-0">Friends</h2>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped table-hover" id="friendsTable">
            <thead class="table-dark">
              <tr>
                <th>Full Name</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card shadow-sm" id="detailsCard" style="display: none;">
      <div class="card-header">
        <h2 class="h5 mb-0">Friend Details</h2>
      </div>
      <div class="card-body">
        <p><strong>ID:</strong> <span id="detailId"></span></p>
        <p><strong>First Name:</strong> <span id="detailFirstName"></span></p>
        <p><strong>Last Name:</strong> <span id="detailLastName"></span></p>
        <p><strong>Phone:</strong> <span id="detailPhone"></span></p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";

    const loadFriendsBtn = document.getElementById("loadFriendsBtn");
    const tableBody = document.querySelector("#friendsTable tbody");
    const messageEl = document.getElementById("message");

    const detailsCard = document.getElementById("detailsCard");
    const detailId = document.getElementById("detailId");
    const detailFirstName = document.getElementById("detailFirstName");
    const detailLastName = document.getElementById("detailLastName");
    const detailPhone = document.getElementById("detailPhone");

    function showMessage(message) {
      messageEl.textContent = message;
    }

    function clearTable() {
      tableBody.innerHTML = "";
    }

    function showFriendDetails(friend) {
      detailId.textContent = friend.id;
      detailFirstName.textContent = friend.firstName;
      detailLastName.textContent = friend.lastName;
      detailPhone.textContent = friend.phone;
      detailsCard.style.display = "block";
    }

    async function showFriend(id) {
      showMessage(`Loading details for friend ID ${id}...`);

      try {
        const response = await fetch(`${API_URL}/${id}`);

        if (response.status === 404) {
          showMessage(`Friend with ID ${id} was not found.`);
          detailsCard.style.display = "none";
          return;
        }

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const friend = await response.json();
        showFriendDetails(friend);
        showMessage(`Showing details for ${friend.firstName} ${friend.lastName}.`);
      } catch (error) {
        showMessage(`Error loading friend details: ${error.message}`);
        detailsCard.style.display = "none";
      }
    }

    function addFriendNameRow(friend) {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>
          <a href="#" onclick="showFriend(${friend.id}); return false;">
            ${friend.firstName} ${friend.lastName}
          </a>
        </td>
      `;

      tableBody.appendChild(row);
    }

    async function loadFriends() {
      clearTable();
      detailsCard.style.display = "none";
      showMessage("Loading friends...");

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const friends = await response.json();

        if (!Array.isArray(friends) || friends.length === 0) {
          showMessage("No friends found.");
          return;
        }

        friends.forEach(addFriendNameRow);
        showMessage(`Loaded ${friends.length} friend(s). Click a name to view details.`);
      } catch (error) {
        showMessage(`Error loading friends: ${error.message}`);
      }
    }

    loadFriendsBtn.addEventListener("click", loadFriends);

    window.showFriend = showFriend;
  </script>
</body>
</html>
